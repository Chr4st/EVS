services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evs
      POSTGRES_PASSWORD: evs
      POSTGRES_DB: evs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evs"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://evs:evs@db:5432/evs
      APP_ENV: development
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
